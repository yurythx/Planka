services:
  planka:
    image: ghcr.io/plankanban/planka:latest
    container_name: planka_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "1337:1337"
    environment:
      - BASE_URL=${BASE_URL}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CACHE_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - TRUST_PROXY=${TRUST_PROXY}
    volumes:
      - planka_avatars:/app/public/user-avatars
      - planka_backgrounds:/app/public/project-backgrounds
      - planka_attachments:/app/public/attachments
    networks:
      - planka_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: planka_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - planka_db_data:/var/lib/postgresql/data
    networks:
      - planka_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: planka_redis
    restart: always
    networks:
      - planka_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  planka_network:
    driver: bridge

volumes:
  planka_avatars:
  planka_backgrounds:
  planka_attachments:
  planka_db_data: